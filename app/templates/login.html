<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 网盘自动转存</title>
    <link rel="stylesheet" href="./static/css/bootstrap.min.css">
    <link rel="stylesheet" href="./static/css/bootstrap-icons.min.css">
    <style>
        :root {
            color-scheme: light dark;
            --apple-blue: #007AFF;
            --apple-blue-hover: #0066d6;
            --font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
        }
        * {
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            background-color: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }
        .login-wrapper {
            width: 100%;
            max-width: 400px;
            animation: loginSlideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .login-icon {
            text-align: center;
            margin-bottom: 24px;
            animation: loginIconFloat 3s ease-in-out infinite;
        }
        .login-icon i {
            font-size: 3rem;
            color: var(--apple-blue);
            filter: drop-shadow(0 4px 12px rgba(0, 122, 255, 0.25));
        }
        .login-card {
            width: 100%;
            background: #ffffff;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.06);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .login-card:hover {
            box-shadow: 0 8px 32px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
        }
        .login-header {
            padding: 2rem 2rem 0.5rem;
            text-align: center;
        }
        .login-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1d1d1f;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #6e6e73;
            font-size: 0.875rem;
            margin: 0;
        }
        .login-body {
            padding: 1.5rem 2rem 2rem;
        }
        .form-label {
            font-size: 0.8125rem;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        .form-control {
            border-radius: 12px;
            border: 1.5px solid rgba(0,0,0,0.08);
            background: #f2f2f7;
            padding: 10px 14px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            -webkit-appearance: none;
        }
        .form-control:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
            background: #fff;
        }
        .form-control::placeholder {
            color: #aeaeb2;
            transition: color 0.15s ease;
        }
        .form-control:focus::placeholder {
            color: transparent;
        }
        .input-group-text {
            background: #f2f2f7;
            border: 1.5px solid rgba(0,0,0,0.08);
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #6e6e73;
            transition: all 0.2s ease;
        }
        .input-group:focus-within .input-group-text {
            border-color: var(--apple-blue);
            color: var(--apple-blue);
        }
        .input-group .form-control {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }
        .btn {
            border-radius: 12px;
            padding: 10px 20px;
            width: 100%;
            font-weight: 600;
            font-size: 0.9375rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: var(--apple-blue);
            border: none;
            color: #fff;
        }
        .btn-primary:hover {
            background: var(--apple-blue-hover);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.3);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(0) scale(0.98);
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.2);
        }
        .alert {
            border-radius: 12px;
            font-size: 0.8125rem;
            animation: shakeAlert 0.4s ease;
        }
        @keyframes loginSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes loginIconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        @keyframes shakeAlert {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
        }
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000000;
            }
            .login-card {
                background: #1c1c1e;
                border-color: rgba(255,255,255,0.08);
                box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            }
            .login-card:hover {
                box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            }
            .login-header h1 { color: #f5f5f7; }
            .login-header p { color: #a1a1a6; }
            .form-label { color: #f5f5f7; }
            .form-control {
                background: #2c2c2e;
                border-color: rgba(255,255,255,0.08);
                color: #f5f5f7;
            }
            .form-control:focus {
                background: #1c1c1e;
                border-color: #0A84FF;
                box-shadow: 0 0 0 3px rgba(10,132,255,0.2);
            }
            .form-control::placeholder {
                color: #636366;
            }
            .input-group-text {
                background: #2c2c2e;
                border-color: rgba(255,255,255,0.08);
                color: #a1a1a6;
            }
            .input-group:focus-within .input-group-text {
                border-color: #0A84FF;
                color: #0A84FF;
            }
            .btn-primary { background: #0A84FF; }
            .btn-primary:hover { 
                background: #409CFF; 
                box-shadow: 0 4px 16px rgba(10, 132, 255, 0.35);
            }
            .login-icon i {
                color: #0A84FF;
                filter: drop-shadow(0 4px 12px rgba(10, 132, 255, 0.3));
            }
        }
        @media (max-width: 480px) {
            .login-card {
                border-radius: 16px;
            }
            .login-header {
                padding: 1.5rem 1.5rem 0.5rem;
            }
            .login-body {
                padding: 1.25rem 1.5rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-icon">
            <i class="bi bi-clouds-fill"></i>
        </div>
        <div class="login-card">
            <div class="login-header">
                <h1 class="mb-3">登录</h1>
                <p>欢迎回来，请登录您的账户</p>
            </div>
            <div class="login-body">
                {% if message %}
                <div class="alert alert-danger text-center" role="alert">
                    [[ message ]]
                </div>
                {% endif %}
                <form action="/login" method="POST">
                    <div class="form-group mb-3">
                        <label for="username" class="form-label">用户名</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            </div>
                            <input type="text" class="form-control" id="username" name="username" placeholder="请输入用户名" required autofocus>
                        </div>
                    </div>
                    <div class="form-group mb-4">
                        <label for="password" class="form-label">密码</label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            </div>
                            <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
